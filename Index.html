<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A.S.H</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f6f6f6;
      font-family: Arial, sans-serif;
      padding-top: 80px;
    }

    /* NAVBAR (museum glass style but still functional Bootstrap) */
    .navbar {
      background: rgba(255,255,255,0.9) !important;
      backdrop-filter: blur(10px);
    }

    /* HERO SECTION */
    .hero {
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .hero p {
      color: #666;
    }

    /* SECTION TITLES */
    .section-title {
      text-align: center;
      margin: 60px 0 30px;
      letter-spacing: 1px;
    }

    /* GALLERY CARDS */
    .gallery-card {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .gallery-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.1);
    }

    /* OVERLAY */
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      opacity: 0;
      transition: 0.3s ease;
      text-align: center;
      padding: 20px;
    }

    .gallery-card:hover .gallery-overlay {
      opacity: 1;
    }
  </style>
</head>

</nav>
