<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    /* Image sizing */
    .card-img-top {
      height: 300px;
      object-fit: cover;
    }

    /* Overlay setup */
    .overlay-card {
      position: relative;
      overflow: hidden;
    }

    /* Overlay layer */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      padding: 20px;

      opacity: 0;
      transition: 0.3s ease;
    }

    /* Show overlay on hover */
    .overlay-card:hover .overlay {
      opacity: 1;
    }

    /* Image zoom */
    .overlay-card img {
      transition: transform 0.4s ease;
    }

    .overlay-card:hover img {
      transform: scale(1.1);
    }
  </style>

</head>
<body>

<nav class="navbar navbar-light bg-light shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="Index.html">A.S.H</a>
  </div>
</nav>

<section class="py-5 text-center">
  <div class="container">
    <h1 class="fw-bold mb-5">Photography</h1>

    <div class="row g-4">

      <!-- Series 1 -->
      <div class="col-md-4">
        <a href="series1.html" class="text-decoration-none">
          <div class="card shadow-sm overlay-card">
            <img src="series1cover.jpg" class="card-img-top">

            <div class="overlay">
              <h5>Single Emotion (2026)</h5>
              <p>Expressing one emotion through three images.</p>
            </div>

          </div>
        </a>
      </div>

      <!-- Series 2 -->
      <div class="col-md-4">
        <a href="series2.html" class="text-decoration-none">
          <div class="card shadow-sm overlay-card">
            <img src="series2cover.jpg" class="card-img-top">

            <div class="overlay">
              <h5>Self Portrait (2026)</h5>
              <p>A story within oneself.</p>
            </div>

          </div>
        </a>
      </div>

      <!-- Series 3 -->
      <div class="col-md-4">
        <a href="series3.html" class="text-decoration-none">
          <div class="card shadow-sm overlay-card">
            <img src="series3cover.jpg" class="card-img-top">

            <div class="overlay">
              <h5>Fine Art (2026)</h5>
              <p>Three images related to a cityscape/urban theme.</p>
            </div>

          </div>
        </a>
      </div>

    </div>
  </div>
</section>

</body>
</html>
